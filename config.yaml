# ------------------------------------------
# 2. 网络架构配置
# ------------------------------------------
models:
  vae:
    pretrained_path: /root/autodl-tmp/sd-vae-ft-mse-diffusers
    scale_factor: 0.18215
    latent_path: /root/autodl-tmp/imagenet_50classes_latents.pt

  dit:
    input_size: 32
    patch_size: 2
    in_channels: 4
    hidden_size: 1152
    depth: 28
    num_heads: 16
    mlp_ratio: 4.0

# ------------------------------------------
# 3. 训练超参数
# ------------------------------------------
stage1_teacher:
  batch_size: 64
  lr: 5.0e-5
  total_steps: 5000
  pretrained_path: /root/autodl-tmp/SiT-XL-2-256.pt
  save_path: checkpoints/teacher

stage2_student:
  batch_size: 16
  accumulate_steps: 4
  total_steps: 10000
  lr: 1.0e-5
  # 冻结学生 SiT 网络的层数，网络浅层捕捉基础视觉特征，中层捕捉局部特征，深层捕捉全局语义
  # 这里冻结 15 层，保留开源模型的部分基础特征捕捉能力，节约算力
  freeze_layers: 15
  # 损失权重配置
  loss_weights:
    boundary: 1.0
    split: 1.0
  teacher_path: checkpoints/teacher/teacher_ema_step_5000.pt
  save_path: checkpoints/student

# ------------------------------------------
# 4. 采样与评估配置
# ------------------------------------------
sampling:
  ckpt_path: checkpoints/student/student_ema_best.pt
  save_dir: samples/student
  batch_size: 64
  num_samples_per_class: 320
  NFEs: [4, 10]
  cfg_scales: [7, 4]

evaluating:
  real_images: /root/autodl-tmp/imagenet_50classes/train
  generated_images: samples/student

log: log.txt